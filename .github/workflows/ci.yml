name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck democtl
          shellcheck scripts/*.sh

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate scripts syntax
        run: |
          bash -n democtl
          for f in scripts/*.sh; do bash -n "$f"; done
      - name: Test democtl help
        run: ./democtl help
      - name: Test democtl list (empty)
        run: sudo ./democtl list

  build-unittest:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: System prep
        run: |
          sudo apt-get update
          sudo apt-get install -y systemd-container debootstrap parted jq e2fsprogs dosfstools psmisc iptables bridge-utils expect curl git

      - name: Initialize host
        run: sudo ./democtl init

      - name: Build unittest demo
        run: |
          sudo ./democtl add unittest \
            --size 4000 \
            --local-vars vars/local_vars_unittest.yml \
            --fg --repo github.com/chapmanjacobd/iiab --branch rpi_image/genericvm

      - name: Verify build
        run: |
          sudo ./democtl list
          sudo ./democtl status unittest
          # Check if the image exists (dereference symlink)
          sudo ls -lhL /var/lib/machines/unittest.raw
