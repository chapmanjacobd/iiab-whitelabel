name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          check-latest: true
      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Run linter
        run: make lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          check-latest: true
      - name: Run unit tests
        run: make test

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          check-latest: true
      - name: Build democtl
        run: make build
      - name: Initialize host
        run: sudo ./democtl init
      - name: Run integration tests
        run: make integration

  build-unittest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          check-latest: true

      - name: Build democtl
        run: make build

      - name: Initialize host
        run: sudo ./democtl init

      - name: Build unittest demo
        run: |
          sudo ./democtl build unittest --start \
            --size 4000 \
            --local-vars vars/local_vars_unittest.yml

      - name: Verify build
        run: |
          sudo ./democtl list
          sudo ./democtl status unittest
          # Check if the build subvolume exists
          sudo ls -ld /var/lib/machines/unittest
          sudo test -d /var/lib/machines/unittest

      - name: Verify container responds via HTTP
        run: |
          set +e  # Don't exit on curl failure
          # Wait for container's web server to be ready
          echo "Waiting for container HTTP service to be ready..."
          READY=false
          CURL_EXIT=1
          for i in $(seq 1 90); do
            HTTP_CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 5 \
              -H "Host: unittest.iiab.io" http://10.0.3.2/ 2>/dev/null)
            CURL_EXIT=$?
            if [[ "$HTTP_CODE" =~ ^[1-5][0-9]{2}$ ]]; then
              echo "  Container responding with HTTP $HTTP_CODE (attempt $i)"
              READY=true
              break
            fi
            # Log every 10 attempts to reduce noise, or on first/last attempt
            if [[ $i -le 3 || $(( i % 10 )) -eq 0 || $i -ge 88 ]]; then
              echo "  Attempt $i: Container not ready yet (curl exit: $CURL_EXIT, http_code: '$HTTP_CODE'), waiting 2s..."
              # Quick in-container diagnostics (non-blocking on success)
              if [[ $(( i % 30 )) -eq 0 ]]; then
                echo "  --- In-container check (attempt $i) ---"
                sudo systemd-run --machine=unittest --quiet --wait \
                  bash -c 'systemctl is-active nginx 2>/dev/null || echo "nginx service unknown"; ss -tln | grep :80 || echo "nothing on :80"' 2>&1 || echo "  (cannot reach container yet)"
              fi
            fi
            sleep 2
          done

          if ! $READY; then
            echo "ERROR: Container HTTP service did not become ready after 180s" >&2
            echo "=== Diagnostic: Ping test ==="
            ping -c 3 -W 2 10.0.3.2 2>&1 || echo "Ping FAILED"
            echo "=== Diagnostic: ARP table ==="
            ip neigh show 2>&1 | grep 10.0.3 || echo "No ARP entries for 10.0.3.0/24"
            echo "=== Diagnostic: Host Networking ==="
            ip addr show iiab-br0 2>&1 || echo "Bridge not found"
            ip route show 2>&1 | grep 10.0.3 || echo "No route to 10.0.3.0/24"
            brctl show 2>&1 || true
            echo "=== Diagnostic: nftables ruleset ==="
            sudo nft list ruleset 2>&1 || echo "No nftables rules"
            echo "=== Diagnostic: iptables FORWARD chain ==="
            sudo iptables -L FORWARD -n -v 2>&1 || echo "No iptables rules"
            echo "=== Diagnostic: Storage backend ==="
            echo "RAMFS mount: $(mountpoint -q /run/iiab-demos/storage && echo YES || echo NO)"
            echo "Disk mount:  $(mountpoint -q /var/iiab-demos/storage && echo YES || echo NO)"
            ls -lh /run/iiab-demos/storage.btrfs 2>/dev/null || echo "No RAM btrfs file"
            ls -lh /var/iiab-demos/storage.btrfs 2>/dev/null || echo "No disk btrfs file"
            losetup -l 2>&1 || true
            echo "=== Diagnostic: Container status ==="
            sudo ./democtl status unittest 2>&1 || true
            echo "=== Diagnostic: Container interface state (host side) ==="
            ip addr show vb-unittest 2>&1 || true
            ip link show vb-unittest 2>&1 || true
            echo "=== Diagnostic: Container service state ==="
            sudo systemctl show "systemd-nspawn@unittest.service" --property=ActiveState,SubState,ExecMainStatus 2>&1 || true
            echo "=== Diagnostic: Container network namespace ==="
            # Use machinectl/systemd-run to run commands inside the container
            # MainPID is the systemd-nspawn host process (host netns), not the container's init
            echo "--- Container interfaces ---"
            sudo systemd-run --machine=unittest --wait ip addr 2>&1 || echo "Failed to run in container"
            echo "--- Container routing ---"
            sudo systemd-run --machine=unittest --wait ip route 2>&1 || true
            echo "--- Container DNS config ---"
            sudo systemd-run --machine=unittest --wait cat /etc/resolv.conf 2>&1 || true
            echo "--- Container local nginx response ---"
            sudo systemd-run --machine=unittest --wait curl -sS -D- --max-time 5 http://127.0.0.1/ 2>&1 | head -30 || echo "curl failed in container"
            echo "--- Follow redirect ---"
            sudo systemd-run --machine=unittest --wait curl -sS -D- -L --max-time 10 http://127.0.0.1/ 2>&1 | head -30 || echo "curl failed in container"
            echo "--- Container listening on port 80 ---"
            sudo systemd-run --machine=unittest --wait ss -tln 2>&1 | grep :80 || echo "Nothing listening on port 80"
            echo "=== Diagnostic: Last 30 lines of container journal ==="
            sudo journalctl -u "systemd-nspawn@unittest.service" --no-pager -n 30 2>&1 || true
            exit 1
          fi

          echo "Container HTTP service is ready, verifying response..."
          HTTP_CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 \
            -H "Host: unittest.iiab.io" http://10.0.3.2/)
          echo "unittest container returned HTTP $HTTP_CODE"
          # Accept 2xx and 3xx — container may redirect to HTTPS or a login page
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ] || [ "$HTTP_CODE" -eq "000" ]; then
            echo "ERROR: Unexpected HTTP status from unittest container" >&2
            exit 1
          fi
          # Show the response headers
          curl -sS --max-time 15 -D- -o /dev/null \
            -H "Host: unittest.iiab.io" http://10.0.3.2/
