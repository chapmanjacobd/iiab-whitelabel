name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck democtl
          shellcheck scripts/*.sh

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y nftables
      - name: Validate scripts syntax
        run: |
          bash -n democtl
          for f in scripts/*.sh; do bash -n "$f"; done
          for f in tests/*.sh; do bash -n "$f"; done
      - name: Test democtl help
        run: ./democtl help
      - name: Test democtl list (empty)
        run: sudo ./democtl list
      - name: Run concurrency tests
        run: sudo bash tests/test-concurrency.sh
      - name: Run e2e tests
        run: sudo bash tests/test-e2e.sh
      - name: Run nginx generation tests
        run: sudo bash tests/test-nginx-gen.sh
      - name: Run nftables isolation tests
        run: sudo bash tests/test-nftables.sh
      - name: Run empirical isolation tests
        run: sudo bash tests/test-isolation-empirical.sh

  build-unittest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Initialize host
        run: sudo ./democtl init

      - name: Build unittest demo
        run: |
          sudo ./democtl build unittest --start \
            --size 4000 \
            --local-vars vars/local_vars_unittest.yml \
            --fg --repo github.com/chapmanjacobd/iiab --branch rpi_image/genericvm

      - name: Verify build
        run: |
          sudo ./democtl list
          sudo ./democtl status unittest
          # Check if the image exists (dereference symlink)
          sudo ls -lhL /var/lib/machines/unittest.raw

      - name: Verify container responds via HTTP
        run: |
          set +e  # Don't exit on curl failure
          # Wait for container's web server to be ready (may take a few seconds after container starts)
          echo "Waiting for container HTTP service to be ready..."
          READY=false
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 5 \
              -H "Host: unittest.iiab.io" http://10.0.3.2/ 2>/dev/null) || true
            if [[ "$HTTP_CODE" =~ ^[1-5][0-9]{2}$ ]]; then
              echo "  Container responding with HTTP $HTTP_CODE (attempt $i)"
              READY=true
              break
            fi
            echo "  Attempt $i: Container not ready yet (curl exit: $?), waiting 2s..."
            sleep 2
          done

          if ! $READY; then
            echo "ERROR: Container HTTP service did not become ready after 60s" >&2
            echo "=== Diagnostic: Ping test ==="
            ping -c 3 -W 2 10.0.3.2 2>&1 || echo "Ping FAILED"
            echo "=== Diagnostic: ARP table ==="
            ip neigh show 2>&1 | grep 10.0.3 || echo "No ARP entries for 10.0.3.0/24"
            echo "=== Diagnostic: Host Networking ==="
            ip addr show iiab-br0 2>&1 || echo "Bridge not found"
            ip route show 2>&1 | grep 10.0.3 || echo "No route to 10.0.3.0/24"
            brctl show 2>&1 || true
            echo "=== Diagnostic: nftables ruleset ==="
            sudo nft list ruleset 2>&1 || echo "No nftables rules"
            echo "=== Diagnostic: iptables FORWARD chain ==="
            sudo iptables -L FORWARD -n -v 2>&1 || echo "No iptables rules"
            echo "=== Diagnostic: Container status ==="
            sudo ./democtl status unittest 2>&1 || true
            echo "=== Diagnostic: Container interface state (host side) ==="
            ip addr show vb-unittest 2>&1 || true
            ip link show vb-unittest 2>&1 || true
            echo "=== Diagnostic: Container service state ==="
            sudo systemctl show "systemd-nspawn@unittest.service" --property=ActiveState,SubState,ExecMainStatus 2>&1 || true
            echo "=== Diagnostic: Container network namespace ==="
            CONTAINER_PID=$(sudo systemctl show "systemd-nspawn@unittest.service" --property=MainPID --value 2>/dev/null)
            if [ -n "$CONTAINER_PID" ] && [ "$CONTAINER_PID" != "0" ]; then
              echo "Container PID: $CONTAINER_PID"
              sudo nsenter -t "$CONTAINER_PID" -n ip addr 2>&1 || true
              sudo nsenter -t "$CONTAINER_PID" -n ip route 2>&1 || true
              sudo nsenter -t "$CONTAINER_PID" -n cat /etc/resolv.conf 2>&1 || true
              echo "--- Container local nginx response ---"
              sudo nsenter -t "$CONTAINER_PID" -n curl -sS -D- --max-time 5 http://127.0.0.1/ 2>&1 | head -30 || echo "curl not available in container"
              echo "--- Follow redirect ---"
              sudo nsenter -t "$CONTAINER_PID" -n curl -sS -D- -L --max-time 10 http://127.0.0.1/ 2>&1 | head -30 || echo "curl not available in container"
              echo "--- Container listening on port 80 ---"
              sudo nsenter -t "$CONTAINER_PID" -n ss -tln 2>&1 | grep :80 || echo "Nothing listening on port 80"
            fi
            echo "=== Diagnostic: Last 30 lines of container journal ==="
            sudo journalctl -u "systemd-nspawn@unittest.service" --no-pager -n 30 2>&1 || true
            exit 1
          fi

          echo "Container HTTP service is ready, verifying response..."
          HTTP_CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 \
            -H "Host: unittest.iiab.io" http://10.0.3.2/)
          echo "unittest container returned HTTP $HTTP_CODE"
          # Accept 2xx and 3xx — container may redirect to HTTPS or a login page
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ] || [ "$HTTP_CODE" -eq "000" ]; then
            echo "ERROR: Unexpected HTTP status from unittest container" >&2
            exit 1
          fi
          # Show the response headers
          curl -sS --max-time 15 -D- -o /dev/null \
            -H "Host: unittest.iiab.io" http://10.0.3.2/
