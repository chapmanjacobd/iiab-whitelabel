name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck democtl
          shellcheck scripts/*.sh

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate scripts syntax
        run: |
          bash -n democtl
          for f in scripts/*.sh; do bash -n "$f"; done
          for f in tests/*.sh; do bash -n "$f"; done
      - name: Test democtl help
        run: ./democtl help
      - name: Test democtl list (empty)
        run: sudo ./democtl list

  concurrency-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run concurrency tests
        run: sudo bash tests/test-concurrency.sh

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run e2e tests
        run: sudo bash tests/test-e2e.sh

  nginx-gen-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run nginx generation tests
        run: sudo bash tests/test-nginx-gen.sh

  nftables-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install nftables
        run: sudo apt-get update && sudo apt-get install -y nftables
      - name: Run nftables isolation tests
        run: sudo bash tests/test-nftables.sh
      - name: Run empirical isolation tests
        run: sudo bash tests/test-isolation-empirical.sh

  build-unittest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: System prep
        run: |
          sudo apt-get update
          sudo apt-get install -y systemd-container debootstrap parted jq e2fsprogs dosfstools psmisc nftables bridge-utils expect curl git

      - name: Initialize host
        run: sudo ./democtl init

      - name: Build unittest demo
        run: |
          sudo ./democtl build unittest --start \
            --size 4000 \
            --local-vars vars/local_vars_unittest.yml \
            --fg --repo github.com/chapmanjacobd/iiab --branch rpi_image/genericvm

      - name: Verify build
        run: |
          sudo ./democtl list
          sudo ./democtl status unittest
          # Check if the image exists (dereference symlink)
          sudo ls -lhL /var/lib/machines/unittest.raw

      - name: Verify container responds via HTTP
        run: |
          # Wait for container's web server to be ready (may take a few seconds after container starts)
          echo "Waiting for container HTTP service to be ready..."
          READY=false
          for i in $(seq 1 30); do
            if curl -sS --max-time 5 -o /dev/null http://10.0.3.2/ 2>/dev/null; then
              READY=true
              break
            fi
            echo "  Attempt $i: Container not ready yet, waiting 2s..."
            sleep 2
          done

          if ! $READY; then
            echo "ERROR: Container HTTP service did not become ready after 60s" >&2
            echo "--- Host Networking ---"
            ip addr
            ip route
            brctl show || true
            sudo nft list ruleset || true
            echo "--- Container status ---"
            sudo ./democtl status unittest || true
            echo "--- Container interface state (host side) ---"
            ip addr show vb-unittest || true
            echo "--- Container service state ---"
            systemctl show "systemd-nspawn@unittest.service" --property=ActiveState,SubState,ExecMainStatus 2>&1 || true
            echo "--- Last 20 lines of container journal ---"
            journalctl -u "systemd-nspawn@unittest.service" --no-pager -n 20 2>&1 || true
            exit 1
          fi

          echo "Container HTTP service is ready, verifying response..."
          HTTP_CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 http://10.0.3.2/)
          echo "unittest container returned HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ]; then
            echo "ERROR: Unexpected HTTP status from unittest container" >&2
            exit 1
          fi
          # Verify the response contains expected content (IIAB landing page or similar)
          curl -sS --max-time 15 -D- http://10.0.3.2/ | head -30
