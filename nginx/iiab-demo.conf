# nginx reverse proxy for IIAB demo server
# Routes *.iiab.io subdomains to systemd-nspawn containers

# Upstream definitions for each container
upstream iiab_small {
    server 10.0.3.10:80;
    keepalive 32;
}

upstream iiab_medium {
    server 10.0.3.20:80;
    keepalive 32;
}

upstream iiab_large {
    server 10.0.3.30:80;
    keepalive 32;
}

# HTTP server - redirect everything to HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Redirect all HTTP to HTTPS, preserving Host header for subdomain routing
    return 301 https://$host$request_uri;
}

# HTTPS server for small.iiab.io
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name small.iiab.io;

    ssl_certificate /etc/letsencrypt/live/iiab.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iiab.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://iiab_small;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

