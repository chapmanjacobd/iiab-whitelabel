# Catch-all for any other *.iiab.io subdomains - redirect to large
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name *.iiab.io;

    ssl_certificate /etc/letsencrypt/live/iiab.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iiab.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 302 https://large.iiab.io$request_uri;
}
