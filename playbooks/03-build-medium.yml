---
# 03-build-medium.yml - Build the medium IIAB container image
- name: Build IIAB Medium Container
  hosts: host
  become: true
  vars_files:
    - ../vars/containers.yml

  tasks:
    - name: Check if medium image already exists
      ansible.builtin.stat:
        path: /var/lib/machines/iiab-medium.raw
      register: medium_image_stat

    - name: Display status
      ansible.builtin.debug:
        msg: >
          Medium container image {{ 'exists' if medium_image_stat.stat.exists else 'needs to be built' }}.
          {{ 'Skipping build.' if medium_image_stat.stat.exists else 'Proceeding with build.' }}

    - name: Build medium container image
      ansible.builtin.command:
        cmd: "{{ playbook_dir }}/../scripts/build-container.sh medium"
      when: not medium_image_stat.stat.exists
      changed_when: true
      register: build_result

    - name: Display build output
      ansible.builtin.debug:
        var: build_result.stdout
      when: not medium_image_stat.stat.exists

    - name: Create container service files
      ansible.builtin.command:
        cmd: "{{ playbook_dir }}/../scripts/container-service.sh medium 10.0.3.20"
      changed_when: true
      register: service_result

    - name: Display service setup info
      ansible.builtin.debug:
        var: service_result.stdout
