---
# 02-build-small.yml - Build the small IIAB container image
- name: Build IIAB Small Container
  hosts: host
  become: true
  vars_files:
    - ../vars/containers.yml

  tasks:
    - name: Check if small image already exists
      ansible.builtin.stat:
        path: /var/lib/machines/iiab-small.raw
      register: small_image_stat

    - name: Display status
      ansible.builtin.debug:
        msg: >
          Small container image {{ 'exists' if small_image_stat.stat.exists else 'needs to be built' }}.
          {{ 'Skipping build.' if small_image_stat.stat.exists else 'Proceeding with build.' }}

    - name: Build small container image
      ansible.builtin.command:
        cmd: "{{ playbook_dir }}/../scripts/build-container.sh small"
      when: not small_image_stat.stat.exists
      changed_when: true
      register: build_result

    - name: Display build output
      ansible.builtin.debug:
        var: build_result.stdout
      when: not small_image_stat.stat.exists

    - name: Create container service files
      ansible.builtin.command:
        cmd: "{{ playbook_dir }}/../scripts/container-service.sh small 10.0.3.10"
      changed_when: true
      register: service_result

    - name: Display service setup info
      ansible.builtin.debug:
        var: service_result.stdout
